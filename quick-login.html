<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Login - Run A Ride</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .demo-box {
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
    }
    .demo-box h3 {
      color: #856404;
      margin-bottom: 10px;
    }
    .demo-box p {
      color: #856404;
      margin: 5px 0;
      font-family: monospace;
      font-size: 14px;
    }
    .quick-login-btn {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border: 2px solid #ffb703;
      background: white;
      color: #1a1a1a;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .quick-login-btn:hover {
      background: #ffb703;
      transform: scale(1.02);
    }
    .quick-login-btn i {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <!-- Back to Home Button -->
    <div class="back-home">
      <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
    </div>

    <!-- Quick Login Card -->
    <div class="auth-card">
      <div class="auth-header">
        <h1>🔑 Quick Login</h1>
        <p>Login instantly with demo accounts</p>
      </div>

      <!-- Demo Accounts Info -->
      <div class="demo-box">
        <h3><i class="fas fa-info-circle"></i> Demo Accounts</h3>
        <p><strong>User Account:</strong></p>
        <p>Email: user@demo.com</p>
        <p>Password: user123</p>
        <br>
        <p><strong>Driver Account:</strong></p>
        <p>Email: driver@demo.com</p>
        <p>Password: driver123</p>
      </div>

      <!-- Quick Login Buttons -->
      <div style="margin: 20px 0;">
        <h3 style="margin-bottom: 10px;">One-Click Login:</h3>
        <button class="quick-login-btn" onclick="quickLogin('user')">
          <i class="fas fa-user"></i> Login as User
        </button>
        <button class="quick-login-btn" onclick="quickLogin('driver')">
          <i class="fas fa-car"></i> Login as Driver
        </button>
      </div>

      <div class="auth-divider">
        <span>OR</span>
      </div>

      <!-- Manual Login Form -->
      <form id="signinForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Enter your email" value="user@demo.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Enter your password" value="user123" required>
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
        </div>

        <button type="submit" class="btn-primary full-width">
          <i class="fas fa-sign-in-alt"></i> Login Manually
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        <p style="margin-top: 10px;"><a href="index.html"><i class="fas fa-home"></i> Back to Home</a></p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = window.location.origin + '/api';
    
    // Demo accounts
    const DEMO_ACCOUNTS = {
      user: {
        email: 'user@demo.com',
        password: 'user123',
        redirect: 'dashboard.html'
      },
      driver: {
        email: 'driver@demo.com',
        password: 'driver123',
        redirect: 'driver-dashboard.html'
      }
    };

    // Quick login function
    async function quickLogin(accountType) {
      const account = DEMO_ACCOUNTS[accountType];
      
      if (!account) {
        alert('Invalid account type');
        return;
      }

      // Show loading
      const buttons = document.querySelectorAll('.quick-login-btn');
      buttons.forEach(btn => {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      });

      try {
        // Try to login with demo account
        const response = await fetch(`${API_BASE_URL}/users/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: account.email,
            password: account.password
          })
        });

        const data = await response.json();

        if (response.ok) {
          // Login successful
          localStorage.setItem('token', data.token);
          localStorage.setItem('userId', data._id);
          localStorage.setItem('userName', data.fullName);
          
          alert(`✅ Logged in as ${data.fullName}!`);
          window.location.href = account.redirect;
        } else {
          // Account doesn't exist yet, create it first
          if (data.message && data.message.includes('Invalid credentials')) {
            await createDemoAccount(accountType, account);
          } else {
            alert('❌ Login failed: ' + data.message);
          }
        }
      } catch (error) {
        console.error('Login error:', error);
        alert('❌ Network error. Please make sure the server is running (npm run dev)');
      } finally {
        // Reset buttons
        buttons.forEach(btn => {
          btn.disabled = false;
        });
        buttons[0].innerHTML = '<i class="fas fa-user"></i> Login as User';
        buttons[1].innerHTML = '<i class="fas fa-car"></i> Login as Driver';
      }
    }

    // Create demo account if it doesn't exist
    async function createDemoAccount(accountType, account) {
      try {
        // Register the demo account
        const registerResponse = await fetch(`${API_BASE_URL}/users/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            fullName: accountType === 'user' ? 'Demo User' : 'Demo Driver',
            email: account.email,
            phone: accountType === 'user' ? '9876543210' : '9876543211',
            password: account.password
          })
        });

        const registerData = await registerResponse.json();

        if (registerResponse.ok) {
          // If driver, create driver profile
          if (accountType === 'driver') {
            await fetch(`${API_BASE_URL}/drivers/register`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${registerData.token}`
              },
              body: JSON.stringify({
                userId: registerData._id,
                vehicleType: 'auto',
                vehicleNumber: 'DL01AB1234'
              })
            });
          }

          // Now login
          localStorage.setItem('token', registerData.token);
          localStorage.setItem('userId', registerData._id);
          localStorage.setItem('userName', registerData.fullName);
          
          alert(`✅ Demo ${accountType} account created and logged in!`);
          window.location.href = account.redirect;
        } else {
          alert('❌ Failed to create demo account: ' + registerData.message);
        }
      } catch (error) {
        console.error('Create demo account error:', error);
        alert('❌ Failed to create demo account. Make sure server is running!');
      }
    }

    // Manual login form
    document.addEventListener('DOMContentLoaded', function() {
      const signinForm = document.getElementById('signinForm');
      const submitBtn = signinForm.querySelector('button[type="submit"]');
      const originalBtnText = submitBtn.innerHTML;
      
      // Password toggle
      const togglePassword = document.getElementById('togglePassword');
      togglePassword.addEventListener('click', function() {
        const passwordField = document.getElementById('password');
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
      });
      
      signinForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        // Show loading
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        
        try {
          const response = await fetch(`${API_BASE_URL}/users/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('userId', data._id);
            localStorage.setItem('userName', data.fullName);
            
            alert(`✅ Login successful! Welcome ${data.fullName}`);
            window.location.href = 'dashboard.html';
          } else {
            alert('❌ Login failed: ' + data.message);
          }
        } catch (error) {
          console.error('Login error:', error);
          alert('❌ Network error. Please check if server is running.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalBtnText;
        }
      });
    });
  </script>
</body>
</html>
