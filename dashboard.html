<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard - Run A Ride</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #ffb703;
      --secondary-color: #fb8500;
      --dark-bg: #1a1a1a;
      --card-bg: #2d2d2d;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --success: #4caf50;
      --danger: #f44336;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark-bg);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .dashboard-title h1 {
      font-size: 2rem;
      margin-bottom: 5px;
      color: var(--primary-color);
    }

    .dashboard-title p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 12px;
      border-left: 4px solid var(--primary-color);
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-icon {
      font-size: 2rem;
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 5px;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Main Content Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    @media (max-width: 968px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Card Styles */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card-title {
      font-size: 1.3rem;
      color: var(--primary-color);
    }

    /* Ride List */
    .ride-list {
      list-style: none;
    }

    .ride-item {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      transition: background 0.3s ease;
      cursor: pointer;
    }

    .ride-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .ride-item:last-child {
      border-bottom: none;
    }

    .ride-route {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .route-marker {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: relative;
    }

    .route-marker.pickup {
      background: var(--success);
    }

    .route-marker.drop {
      background: var(--danger);
    }

    .route-line {
      flex: 1;
      height: 2px;
      background: linear-gradient(to right, var(--success), var(--danger));
      position: relative;
    }

    .ride-info h4 {
      color: var(--text-primary);
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .ride-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .meta-item i {
      color: var(--primary-color);
    }

    .ride-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
    }

    .ride-status {
      padding: 6px 15px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-completed {
      background: rgba(76, 175, 80, 0.2);
      color: var(--success);
    }

    .status-ongoing {
      background: rgba(255, 183, 3, 0.2);
      color: var(--primary-color);
    }

    .status-cancelled {
      background: rgba(244, 67, 54, 0.2);
      color: var(--danger);
    }

    .status-pending {
      background: rgba(255, 152, 0, 0.2);
      color: #ff9800;
    }

    .ride-amount {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--primary-color);
    }

    /* Profile Section */
    .profile-section {
      text-align: center;
    }

    .user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 3rem;
      color: var(--dark-bg);
    }

    .user-name {
      font-size: 1.5rem;
      color: var(--primary-color);
      margin-bottom: 5px;
    }

    .user-email {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .profile-stat {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 8px;
    }

    .profile-stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary-color);
    }

    .profile-stat-label {
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    /* Quick Actions */
    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-action {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-primary-action {
      background: var(--primary-color);
      color: var(--dark-bg);
    }

    .btn-primary-action:hover {
      background: var(--secondary-color);
      transform: scale(1.05);
    }

    .btn-secondary-action {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .btn-secondary-action:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Saved Addresses */
    .address-list {
      list-style: none;
    }

    .address-item {
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .address-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .address-icon {
      color: var(--primary-color);
      font-size: 1.2rem;
    }

    /* Loading Spinner */
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid var(--primary-color);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 15px;
      opacity: 0.3;
    }

    /* Back Button */
    .back-home {
      margin-bottom: 20px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 10px 20px;
      background: var(--card-bg);
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: var(--primary-color);
      color: var(--dark-bg);
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .filter-tab.active {
      background: var(--primary-color);
      color: var(--dark-bg);
      border-color: var(--primary-color);
    }

    .filter-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <!-- Back to Home Button -->
  <div class="back-home">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>

  <div class="dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
      <div class="dashboard-title">
        <h1><i class="fas fa-user-circle"></i> My Dashboard</h1>
        <p id="welcomeMessage">Welcome back!</p>
      </div>
      <button class="btn-action btn-secondary-action" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-car"></i>
        </div>
        <div class="stat-value" id="totalRides">0</div>
        <div class="stat-label">Total Rides</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-rupee-sign"></i>
        </div>
        <div class="stat-value" id="totalSpent">₹0</div>
        <div class="stat-label">Total Spent</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-clock"></i>
        </div>
        <div class="stat-value" id="avgRating">0.0</div>
        <div class="stat-label">Avg Rating</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-calendar-check"></i>
        </div>
        <div class="stat-value" id="thisMonth">0</div>
        <div class="stat-label">This Month</div>
      </div>
    </div>

    <!-- Main Dashboard Grid -->
    <div class="dashboard-grid">
      <!-- Left Column - Ride History -->
      <div>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title"><i class="fas fa-history"></i> Ride History</h3>
          </div>



          <ul class="ride-list" id="rideList">
            <li class="empty-state">
              <i class="fas fa-car"></i>
              <p>Loading your rides...</p>
            </li>
          </ul>
        </div>
      </div>

      <!-- Right Column - Profile & Actions -->
      <div>
        <!-- Profile Card -->
        <div class="card profile-section">
          <div class="user-avatar">
            <i class="fas fa-user"></i>
          </div>
          <h3 class="user-name" id="userName">Loading...</h3>
          <p class="user-email" id="userEmail">-</p>

          <div class="profile-stats">
            <div class="profile-stat">
              <div class="profile-stat-value" id="profileRides">0</div>
              <div class="profile-stat-label">Rides</div>
            </div>
            <div class="profile-stat">
              <div class="profile-stat-value" id="profileRating">0.0</div>
              <div class="profile-stat-label">Rating</div>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title"><i class="fas fa-bolt"></i> Quick Actions</h3>
          </div>
          <div class="quick-actions">
            <a href="book-ride.html" class="btn-action btn-primary-action">
              <i class="fas fa-map-marked-alt"></i> Book a Ride
            </a>
          </div>
        </div>


      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="script.js"></script>
  <script src="socket-client.js"></script>
  <script src="user-dashboard.js"></script>
</body>
</html>
