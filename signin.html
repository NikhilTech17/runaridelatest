<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Run A Ride</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <!-- Back to Home Button -->
    <div class="back-home">
      <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
    </div>

    <!-- Sign In Card -->
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to your Run A Ride account</p>
      </div>

      <form id="signinForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
          </div>
          <span class="error-message" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
          <span class="error-message" id="password-error"></span>
        </div>

        <div class="form-options">
          <div class="remember-me">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary full-width">Sign In</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        <p style="margin-top: 10px;"><a href="quick-login.html"><i class="fas fa-bolt"></i> Quick Demo Login</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Sign In specific JavaScript with Backend Integration
    document.addEventListener('DOMContentLoaded', function() {
      const signinForm = document.getElementById('signinForm');
      const submitBtn = signinForm.querySelector('button[type="submit"]');
      const originalBtnText = submitBtn.innerHTML;
      
      // Password toggle functionality
      const togglePassword = document.getElementById('togglePassword');
      togglePassword.addEventListener('click', function() {
        const passwordField = document.getElementById('password');
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
      });
      
      signinForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Clear previous errors
        clearErrors();
        
        // Get form values
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        
        // Validate form
        let isValid = true;
        
        if (!validateEmail(email)) {
          showErrorMessage('email-error', 'Please enter a valid email address');
          isValid = false;
        }
        
        if (!validatePassword(password)) {
          showErrorMessage('password-error', 'Password must be at least 6 characters');
          isValid = false;
        }
        
        if (!isValid) return;
        
        // Show loading state
        setLoadingState(true);
        
        try {
          // Make API request to backend
          const response = await fetch('/api/users/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            // Store token in localStorage
            localStorage.setItem('token', data.token);
            localStorage.setItem('userId', data._id);
            localStorage.setItem('userName', data.fullName);
            
            // Remember me functionality
            if (remember) {
              localStorage.setItem('rememberedEmail', email);
            } else {
              localStorage.removeItem('rememberedEmail');
            }
            
            // Show success message
            showSuccessMessage('✅ Login successful! Redirecting...');
            
            // Redirect after short delay
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1000);
          } else {
            // Show error from server
            showErrorMessage('password-error', data.message || 'Invalid credentials');
          }
        } catch (error) {
          console.error('Login error:', error);
          showErrorMessage('password-error', 'Network error. Please check your connection and try again.');
        } finally {
          // Remove loading state
          setLoadingState(false);
        }
      });
      
      // Set loading state
      function setLoadingState(isLoading) {
        if (isLoading) {
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
          submitBtn.style.opacity = '0.7';
        } else {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalBtnText;
          submitBtn.style.opacity = '1';
        }
      }
      
      // Load remembered email if exists
      const rememberedEmail = localStorage.getItem('rememberedEmail');
      if (rememberedEmail) {
        document.getElementById('email').value = rememberedEmail;
        document.getElementById('remember').checked = true;
      }
      
      // Real-time validation
      document.getElementById('email').addEventListener('blur', function() {
        const email = this.value.trim();
        if (email && !validateEmail(email)) {
          showErrorMessage('email-error', 'Please enter a valid email address');
        } else {
          clearError('email-error');
        }
      });
      
      document.getElementById('password').addEventListener('blur', function() {
        const password = this.value;
        if (password && !validatePassword(password)) {
          showErrorMessage('password-error', 'Password must be at least 6 characters');
        } else {
          clearError('password-error');
        }
      });
    });
  </script>
</body>
</html>
